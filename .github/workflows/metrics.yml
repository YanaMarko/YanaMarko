name: Metrics
on:
  # Запуск по расписанию: каждый день в 00:00 UTC
  schedule: [{cron: "0 0 * * *"}]
  # Позволяет запускать генерацию вручную в панели Actions
  workflow_dispatch:
  # Запуск при каждом пуше в основную ветку
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: General Activity Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics.svg
          user: YanaMarko
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/Moscow # Укажите ваш часовой пояс
         
          # Плагин достижений (как на вашем первом фото)
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_secrets: yes
          plugin_achievements_threshold: X
